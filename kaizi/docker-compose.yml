# Local dev stack: Postgres + the Kaizi server, migrated automatically.
#
#   docker compose up
#
# gives you a working backend on http://localhost:4000 with zero manual
# Postgres setup. Runs in Twilio mock mode by default (no TWILIO_* vars set)
# — see server/.env.example / server/README.md to go live. This file is for
# local development only; see server/DEPLOYMENT.md for production hosting.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kaizi
      POSTGRES_DB: kaizi
    ports:
      - "5432:5432"
    volumes:
      - kaizi-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kaizi"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: ["node", "dist/db/migrate.js"]
    environment:
      DATABASE_URL: postgres://postgres:kaizi@postgres:5432/kaizi
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      # NOT "production" on purpose: src/index.ts refuses to boot with
      # NODE_ENV=production unless either full Twilio creds or a real
      # SESSION_SECRET-backed live config are present, as a fail-closed guard
      # against mock verification (code 000000) ever being reachable in prod.
      # This stack is for local dev/mock-mode use, so it runs as
      # "development" — the Dockerfile's own ENV NODE_ENV=production is what
      # a real deployment uses (see server/DEPLOYMENT.md).
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:kaizi@postgres:5432/kaizi
      SESSION_SECRET: local-dev-session-secret-change-me
      KAIZI_ENFORCE_QUIET_HOURS: "false"
      # Twilio + ANTHROPIC_API_KEY intentionally left unset: server runs in
      # mock mode (verify code 000000, SMS logged not sent, canned chat
      # replies). Add them here (or via an env_file / `docker compose run -e`)
      # to exercise live mode locally.
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  kaizi-pg-data:
