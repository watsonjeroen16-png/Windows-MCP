name: Kaizi CI

on:
  push:
    paths:
      - 'kaizi/**'
      - '.github/workflows/kaizi-ci.yml'
  pull_request:
    paths:
      - 'kaizi/**'
      - '.github/workflows/kaizi-ci.yml'

jobs:
  server:
    name: Server (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kaizi/server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kaizi/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (in-memory suite, no Postgres required)
        run: npm test

  app:
    name: App (typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kaizi/app
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kaizi/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
